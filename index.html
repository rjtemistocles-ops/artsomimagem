<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artsom & Imagem</title>
    <style>
        /* ===== Reset básico ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
            line-height: 1.6;
        }

        /* ===== Cabeçalho ===== */
        header {
            text-align: center;
            padding: 30px 20px;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2em;
            margin-bottom: 15px;
            color: #1a1a1a;
        }

        .logo-principal {
            max-width: 200px;
            height: auto;
            margin-bottom: 20px;
        }

        .logos-secundarias {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .logos-secundarias img {
            max-width: 120px;
            height: auto;
            transition: transform 0.3s;
        }

        .logos-secundarias img:hover {
            transform: scale(1.1);
        }

        /* ===== Seções ===== */
        section {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #1a1a1a;
        }

        p {
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        /* ===== Rodapé ===== */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #1a1a1a;
            color: #fff;
        }

        /* ===== Responsividade ===== */
        @media (max-width: 600px) {
            .logo-principal {
                max-width: 150px;
            }

            .logos-secundarias img {
                max-width: 80px;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== Cabeçalho ===== -->
    <header>
        <h1>Artsom & Imagem</h1>
        <img src="Imagem/logo.png" alt="Logo Artsom & Imagem" class="logo-principal">
        <div class="logos-secundarias">
            <img src="Imagem/semp.png" alt="Assistência Técnica SEMP">
            <img src="Imagem/tcl.png" alt="Assistência Técnica TCL">
        </div>
    </header>

    <!-- ===== Seção de Serviços (Exemplo) ===== -->
    <section>
        <h2>Nossos Serviços</h2>
        <p>Assistência técnica autorizada SEMP e TCL</p>
        <p>Reparo, manutenção e suporte técnico especializado</p>
    </section>

    <!-- ===== Rodapé ===== -->
    <footer>
        &copy; 2026 Artsom & Imagem – Todos os direitos reservados
    </footer>

</body>
</html>

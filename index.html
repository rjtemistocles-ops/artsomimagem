<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ArtSom & Imagem</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #ffffff;
      text-align: center;
    }

    header {
      padding: 40px 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 5px;
    }

    h2 {
      font-size: 20px;
      font-weight: normal;
      color: #444;
      margin-bottom: 30px;
    }

    .logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .logos img {
      max-height: 70px;
      width: auto;
    }
  </style>
</head>
<body>

<header>
  <h1>ArtSom &amp; Imagem</h1>
  <h2>Assistência Técnica Autorizada – SEMP • TCL</h2>

  <div class="logos">
    <img src="semp.png" alt="Assistência Técnica Autorizada SEMP">
    <img src="tcl.png" alt="Assistência Técnica Autorizada TCL">
  </div>
</header>

</body>
</html>
